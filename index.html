<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: transparent; }
      model-viewer {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <model-viewer
      src="https://cdn.jsdelivr.net/gh/julian-kuerbitoo/anie3D@main/AnieChibiRetopo-optimizado.glb"
      auto-rotate
      camera-controls
      shadow-intensity="1">
    </model-viewer>
  </body>
</html>
