<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * { margin: 0; padding: 0; }
      body { width: 100vw; height: 100vh; }
      model-viewer { width: 100%; height: 100%; --progress-bar-color: transparent; }
    </style>
  </head>
  <body>
    <script type="module" 
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
    </script>
<model-viewer
  src="https://cdn.jsdelivr.net/gh/julian-kuerbitoo/anie3D@main/AnieChibiRetopo-v3.glb"
  camera-controls
  disable-zoom
  camera-orbit="0deg 75deg 90%"
  environment-image="https://cdn.jsdelivr.net/gh/julian-kuerbitoo/anie3D@main/ferndale_studio_04_1k.hdr"
  exposure="0.6"
  shadow-intensity="0.5"
  tone-mapping="commerce">
</model-viewer>
  </body>
</html>
